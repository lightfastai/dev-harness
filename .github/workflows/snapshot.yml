name: Snapshot Release

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]

concurrency:
  group: snapshot-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  snapshot:
    name: Publish PR snapshot
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect pending changesets
        id: detect
        run: |
          files=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' 2>/dev/null)
          if [ -n "$files" ]; then
            echo "has_changeset=true" >> "$GITHUB_OUTPUT"
            echo "Pending changesets:"
            echo "$files"
          else
            echo "has_changeset=false" >> "$GITHUB_OUTPUT"
            echo "No pending changeset on this PR — skipping snapshot publish."
          fi

      - if: steps.detect.outputs.has_changeset == 'true'
        uses: pnpm/action-setup@v4

      - if: steps.detect.outputs.has_changeset == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - if: steps.detect.outputs.has_changeset == 'true'
        run: pnpm install --frozen-lockfile

      - if: steps.detect.outputs.has_changeset == 'true'
        run: pnpm turbo typecheck test build --filter='@lightfastai/dev-*'

      - name: Compute snapshot version tag
        if: steps.detect.outputs.has_changeset == 'true'
        id: tag
        run: echo "tag=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"

      - name: Bump versions to snapshot
        if: steps.detect.outputs.has_changeset == 'true'
        run: pnpm changeset version --snapshot ${{ steps.tag.outputs.tag }}

      - name: Publish snapshot to npm
        if: steps.detect.outputs.has_changeset == 'true'
        run: pnpm changeset publish --tag ${{ steps.tag.outputs.tag }} --no-git-tag
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true

      - name: Comment install instructions on PR
        if: steps.detect.outputs.has_changeset == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = `pr-${context.issue.number}`;
            const body = [
              `### 📦 Snapshot published to npm under \`${tag}\``,
              ``,
              `Install in any consumer to test this PR:`,
              ``,
              '```bash',
              `pnpm add @lightfastai/dev-cli@${tag}`,
              `pnpm add @lightfastai/dev-core@${tag}`,
              `pnpm add @lightfastai/dev-proxy@${tag}`,
              `pnpm add @lightfastai/dev-services@${tag}`,
              '```',
              ``,
              `Snapshots never become \`latest\` and are pruned on merge.`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body.startsWith('### 📦 Snapshot published'));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
